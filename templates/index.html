<!DOCTYPE html>
<html>

<head>
    <title>Secure Firewall Rule Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>🛡 Secure Firewall Rule Management System</h1>

<a class="button" href="/add">+ Add New Rule</a>

<table>

<tr>
<th>#</th>
<th>IP Address</th>
<th>Action</th>
<th>Delete</th>
</tr>

{% for rule in rules %}

<tr>

<td>{{ loop.index }}</td>

<td>{{ rule.ip }}</td>

<td>{{ rule.action }}</td>

<td>

<a class="delete" href="/delete/{{ loop.index0 }}">Delete</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
